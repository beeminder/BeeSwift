name: Fastlane Tests

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: '26.5'
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Use sample configuration
      run: cp BeeKit/Config.swift.sample BeeKit/Config.swift
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: SPMCache
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    - name: Setup ruby and install gems
      uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
      with:
        ruby-version: '3.3.5'
        bundler-cache: true
    - name: Enable Macros
      run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
    - name: Run tests
      env:
        # Cold SPM cache (e.g. on a dependency-bump PR that changes
        # Package.resolved and invalidates the cache key) makes
        # `xcodebuild -showBuildSettings` block on package resolution
        # longer than fastlane's default ~45s retry budget. Give it room
        # instead of failing the test run.
        FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '180'
        FASTLANE_XCODEBUILD_SETTINGS_RETRIES: '5'
      run: bundle exec fastlane ci
    - name: Verify Package.resolved is consistent
      run: |
        if ! git diff --quiet BeeSwift.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved; then
          echo "::error::Package.resolved was modified during build. This means the checked-in versions are incompatible with the project's dependency constraints. Diff:"
          git diff BeeSwift.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          exit 1
        fi
    - name: Upload report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always() # always run even if the previous step fails
      with:
        name: test-output
        path: fastlane/test_output
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
      if: always() # always run even if the previous step fails
      with:
        report_paths: 'fastlane/test_output/report.junit'
