name: Weekly TestFlight Build

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  workflow_dispatch:

concurrency:
  group: testflight-build
  cancel-in-progress: false

# Least-privilege default for GITHUB_TOKEN; the build job opts up to
# contents: write for the tag pushes.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Check whether HEAD was already built
      id: changes
      run: |
        set -eu
        git fetch --quiet --depth=1 origin 'refs/tags/ci-latest:refs/tags/ci-latest' || true
        head_commit="$(git rev-parse HEAD)"
        if git rev-parse -q --verify refs/tags/ci-latest >/dev/null; then
          last_commit="$(git rev-list -n1 ci-latest)"
          echo "Last CI build: $last_commit"
          echo "HEAD:          $head_commit"
          if [ "$last_commit" = "$head_commit" ]; then
            echo "No changes since last build; skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        else
          echo "No ci-latest tag yet; building."
        fi
        echo "should_build=true" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    environment: testflight
    permissions:
      contents: write # push the per-build and ci-latest tags

    steps:
    - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: '26.5'
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Write BeeKit configuration
      env:
        CONFIG_SWIFT: ${{ secrets.CONFIG_SWIFT }}
      run: printf '%s' "$CONFIG_SWIFT" > BeeKit/Config.swift
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: SPMCache
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    - name: Setup ruby and install gems
      uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
      with:
        ruby-version: '3.3.5'
        bundler-cache: true
    - name: Enable Macros
      run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
    - name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    - name: Set up SSH agent for match
      uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
      with:
        ssh-private-key: ${{ secrets.MATCH_SSH_KEY }}
    - name: Build and upload to TestFlight
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        # Cold SPM cache (e.g. after a dependency bump invalidates the
        # Package.resolved cache key) makes `xcodebuild -showBuildSettings`
        # block on package resolution longer than fastlane's default
        # ~45s retry budget. Give it room instead of failing the build.
        FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '180'
        FASTLANE_XCODEBUILD_SETTINGS_RETRIES: '5'
      run: bundle exec fastlane beta_ci
    - name: Update ci-latest pointer
      if: success()
      run: |
        git tag -f ci-latest
        git push -f origin refs/tags/ci-latest
    - name: Upload build log
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: build-output
        path: fastlane/build_output
