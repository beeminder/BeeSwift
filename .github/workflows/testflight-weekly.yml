name: Weekly TestFlight Build

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  workflow_dispatch:
  # TEMPORARY: pre-merge validation only. Remove this push trigger before merging.
  push:
    branches:
      - claude/auto-testflight-builds-ZbOTz

concurrency:
  group: testflight-build
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # need full history + all tags to find the last build
    - name: Check for changes since last build
      id: changes
      run: |
        set -eu
        last_tag="$(git tag --list 'builds/*' --sort=-creatordate | head -n1)"
        head_commit="$(git rev-parse HEAD)"
        if [ -z "$last_tag" ]; then
          echo "No prior build tag; building."
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        last_commit="$(git rev-list -n1 "$last_tag")"
        echo "Last build: $last_tag -> $last_commit"
        echo "HEAD:        $head_commit"
        if [ "$last_commit" = "$head_commit" ]; then
          echo "No changes since last build; skipping."
          echo "should_build=false" >> "$GITHUB_OUTPUT"
        else
          echo "Changes since last build; building."
          echo "should_build=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    environment: testflight
    permissions:
      contents: write # push the per-build git tag

    steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.1'
    - uses: actions/checkout@v6
    - name: Write BeeKit configuration
      env:
        CONFIG_SWIFT: ${{ secrets.CONFIG_SWIFT }}
      run: printf '%s' "$CONFIG_SWIFT" > BeeKit/Config.swift
    - uses: actions/cache@v5
      with:
        path: SPMCache
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    - name: Setup ruby and install gems
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3.5'
        bundler-cache: true
    - name: Enable Macros
      run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
    - name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    - name: Set up SSH agent for match
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.MATCH_SSH_KEY }}
    - name: Build and upload to TestFlight
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      run: bundle exec fastlane beta_ci
    - name: Upload build log
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: build-output
        path: fastlane/build_output
